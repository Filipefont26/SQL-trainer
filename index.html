<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Trainer — Aprenda SQL na Prática</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG Grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .level-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    color: var(--accent);
    font-weight: 700;
  }

  /* MAIN LAYOUT */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* PROGRESS BAR */
  .progress-track {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .xp-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--yellow);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    padding: 3px 10px;
    border-radius: 99px;
  }

  /* CHALLENGE CARD */
  .challenge-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .challenge-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }

  .challenge-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }

  .challenge-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .tag-difficulty-easy { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
  .tag-difficulty-medium { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.25); }
  .tag-difficulty-hard { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .tag-topic { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }

  .challenge-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .challenge-title {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .challenge-desc {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  /* SCHEMA PANEL */
  .schema-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .schema-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .tables-grid {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .table-schema {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-width: 180px;
  }

  .table-schema-header {
    background: rgba(0,212,255,0.08);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .table-icon { opacity: 0.6; }

  .table-schema-body { padding: 10px 0; }

  .col-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 14px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .col-name { color: var(--text); }
  .col-type { color: var(--muted); font-size: 10px; }
  .col-pk {
    font-size: 9px;
    background: rgba(245,158,11,0.15);
    color: var(--yellow);
    border-radius: 3px;
    padding: 1px 4px;
    font-weight: 700;
  }

  /* EDITOR */
  .editor-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .editor-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea#query-editor {
    width: 100%;
    min-height: 140px;
    background: #060d1a;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: #e2e8f0;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.8;
    padding: 20px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    tab-size: 2;
  }

  textarea#query-editor:focus {
    border-color: rgba(0,212,255,0.4);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.06);
  }

  textarea#query-editor::placeholder { color: #334155; }

  .editor-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-run {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-run:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,0.3); }
  .btn-run:active { transform: translateY(0); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-hint:hover { border-color: var(--accent); color: var(--accent); }

  .btn-skip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .btn-skip:hover { border-color: var(--muted); color: var(--text); }

  .btn-back {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-back:disabled { opacity: 0.25; cursor: not-allowed; }

  /* LOADING */
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    margin-bottom: 20px;
    display: none;
    animation: loadingAnim 1.5s infinite;
  }

  @keyframes loadingAnim {
    0% { transform: scaleX(0); transform-origin: left; }
    50% { transform: scaleX(1); transform-origin: left; }
    51% { transform: scaleX(1); transform-origin: right; }
    100% { transform: scaleX(0); transform-origin: right; }
  }

  /* FEEDBACK PANEL */
  .feedback-panel {
    display: none;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
  }

  .feedback-header.correct { background: rgba(16,185,129,0.1); border-bottom: 1px solid rgba(16,185,129,0.2); }
  .feedback-header.wrong { background: rgba(239,68,68,0.08); border-bottom: 1px solid rgba(239,68,68,0.15); }
  .feedback-header.hint-mode { background: rgba(245,158,11,0.08); border-bottom: 1px solid rgba(245,158,11,0.15); }

  .feedback-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .feedback-icon.correct { background: rgba(16,185,129,0.2); }
  .feedback-icon.wrong { background: rgba(239,68,68,0.15); }
  .feedback-icon.hint-mode { background: rgba(245,158,11,0.15); }

  .feedback-title {
    font-size: 17px;
    font-weight: 800;
  }

  .feedback-title.correct { color: var(--green); }
  .feedback-title.wrong { color: var(--red); }
  .feedback-title.hint-mode { color: var(--yellow); }

  .feedback-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .feedback-body {
    background: var(--surface);
    padding: 24px;
  }

  .feedback-section {
    margin-bottom: 20px;
  }

  .feedback-section:last-child { margin-bottom: 0; }

  .feedback-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .feedback-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }

  pre.feedback-code {
    background: #060d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--accent);
    overflow-x: auto;
    white-space: pre-wrap;
  }

  .result-table-wrap {
    background: #060d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    max-height: 220px;
  }

  table.result-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  table.result-table th {
    background: rgba(0,212,255,0.06);
    color: var(--accent);
    font-weight: 700;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky; top: 0;
  }

  table.result-table td {
    padding: 9px 16px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    color: var(--text);
  }

  table.result-table tr:last-child td { border-bottom: none; }
  table.result-table tr:hover td { background: rgba(255,255,255,0.02); }

  .btn-next {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--green), #059669);
    color: white;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
  }

  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.3); }

  /* HINT BOX */
  .hint-box {
    display: none;
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--yellow);
    line-height: 1.7;
    animation: slideUp 0.25s ease;
  }

  .hint-box strong { color: #fbbf24; }

  /* SIDE STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    text-align: center;
  }

  .stat-number {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-number.green { color: var(--green); }
  .stat-number.yellow { color: var(--yellow); }
  .stat-number.accent { color: var(--accent); }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* STREAK */
  .streak-bar {
    display: flex;
    gap: 5px;
    margin-bottom: 28px;
    align-items: center;
    flex-wrap: wrap;
  }

  .streak-dot {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .streak-dot.active { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); }
  .streak-dot.current { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.5); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(0,212,255,0); }
  }

  .streak-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px 20px 40px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  footer span { color: var(--accent); }

  /* SPINNER */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 24px 16px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-number { font-size: 22px; }
    .tables-grid { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">S<span style="color:rgba(255,255,255,0.5)">Q</span>L</div>
    <div class="logo-text">SQL<span>Trainer</span></div>
  </div>
  <div class="header-meta">
    <span class="level-badge">NÍVEL 1</span>

  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number green" id="stat-correct">0</div>
      <div class="stat-label">Corretas</div>
    </div>
    <div class="stat-card">
      <div class="stat-number yellow" id="stat-xp">0</div>
      <div class="stat-label">XP Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-number accent" id="stat-streak">1</div>
      <div class="stat-label">Sequência</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-track">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 5 desafios</div>
  </div>

  <!-- STREAK DOTS -->
  <div class="streak-bar" id="streak-bar">
    <div class="streak-dot current" id="dot-1">⚡</div>
    <div class="streak-dot" id="dot-2">○</div>
    <div class="streak-dot" id="dot-3">○</div>
    <div class="streak-dot" id="dot-4">○</div>
    <div class="streak-dot" id="dot-5">○</div>
    <div class="streak-dot" id="dot-6">○</div>
    <div class="streak-dot" id="dot-7">○</div>
    <div class="streak-dot" id="dot-8">○</div>
    <div class="streak-dot" id="dot-9">○</div>
    <div class="streak-dot" id="dot-10">○</div>
    <div class="streak-dot" id="dot-11">○</div>
    <div class="streak-dot" id="dot-12">○</div>
    <div class="streak-dot" id="dot-13">○</div>
    <div class="streak-dot" id="dot-14">○</div>
    <div class="streak-dot" id="dot-15">○</div>
    <div class="streak-dot" id="dot-16">○</div>
    <div class="streak-dot" id="dot-17">○</div>
    <div class="streak-dot" id="dot-18">○</div>
    <div class="streak-dot" id="dot-19">○</div>
    <div class="streak-dot" id="dot-20">○</div>
    <div class="streak-label">Sequência de acertos</div>
  </div>

  <!-- CHALLENGE CARD -->
  <div class="challenge-card">
    <div class="challenge-header">
      <div class="challenge-meta" id="challenge-meta">
        <!-- filled by JS -->
      </div>
      <div class="challenge-number" id="challenge-number">Desafio 1 de 5</div>
    </div>

    <div class="challenge-title" id="challenge-title">Carregando...</div>
    <div class="challenge-desc" id="challenge-desc"></div>

    <!-- SCHEMA -->
    <div class="schema-panel">
      <div class="schema-label">📋 Schema das Tabelas</div>
      <div class="tables-grid" id="schema-tables"></div>
    </div>

    <!-- EDITOR -->
    <div class="editor-label">✍️ Sua Query SQL</div>
    <div class="hint-box" id="hint-box"></div>
    <div class="editor-wrap">
      <textarea id="query-editor" placeholder="-- Escreva sua query SQL aqui
SELECT ..."></textarea>
    </div>

    <div class="editor-actions">
      <button class="btn-run" id="btn-run" onclick="runQuery()">
        <span>▶</span>
        <span>Executar Query</span>
        <div class="spinner" id="spinner"></div>

// ===== SQL VALIDATOR (local, sem API) =====
function normalizeSQL(q) {
  return q.toLowerCase().replace(/\s+/g, ' ').replace(/[`"]/g, '').trim();
}

function evaluateQuery(query, ch) {
  const n = normalizeSQL(query);

  // Must have SELECT and FROM
  if (!n.includes('select') || !n.includes('from')) {
    return {
      correct: false, score: 0,
      explanation: "Sua query precisa ter pelo menos SELECT e FROM.",
      optimization: "Toda query começa com SELECT ... FROM tabela.",
      correct_query: ch.correctQuery || '', encouragement: "Comece pelo básico!"
    };
  }

  // Run per-challenge rules — each rule is REQUIRED unless marked optional
  const rules = ch.validation || [];
  let totalPoints = 0;
  let earnedPoints = 0;
  let missing = [];

  for (const rule of rules) {
    totalPoints += rule.points;

    // keywords can be:
    // "word"          → n must include it
    // ["a","b"]       → n must include ALL of them (AND)
    // [["a","b"],["c"]] → n must match at least ONE sub-array (OR of ANDs)
    const kw = rule.keywords;
    let matched = false;

    if (typeof kw === 'string') {
      matched = n.includes(kw.toLowerCase());
    } else if (Array.isArray(kw)) {
      // Check if first element is also an array → OR logic
      if (Array.isArray(kw[0])) {
        matched = kw.some(group => group.every(k => n.includes(k.toLowerCase())));
      } else {
        // All strings → AND logic
        matched = kw.every(k => n.includes(k.toLowerCase()));
      }
    }

    if (matched) {
      earnedPoints += rule.points;
    } else {
      missing.push(rule.label);
    }
  }

  // Score is purely based on earned vs total — no free base points
  const score = totalPoints > 0 ? Math.round((earnedPoints / totalPoints) * 100) : 0;
  const correct = score >= 80 && missing.length === 0;

  let explanation = '';
  if (correct) {
    explanation = "Ótimo! Sua query tem a estrutura correta para resolver este desafio.";
  } else if (missing.length > 0) {
    explanation = "Elementos faltando na sua query: " + missing.slice(0, 3).join(', ') + ".";
  } else {
    explanation = "Sua query está quase lá! Revise a lógica e os filtros.";
  }

  const optimization = ch.optimizationTip || "Sempre use aliases (AS) para deixar as colunas do resultado mais legíveis.";

  const encs = correct
    ? ["🔥 Arrasou!", "💪 Perfeito!", "🚀 Você manda bem em SQL!"]
    : score >= 50
      ? ["💡 Quase lá!", "🧠 Boa lógica, ajuste os detalhes!", "📈 Progredindo!"]
      : ["🌱 Todo expert já foi iniciante!", "💪 Não desista!", "🎯 Analise a dica e tente de novo!"];
  const encouragement = encs[Math.floor(Math.random() * encs.length)];

  return { correct, score, explanation, optimization, correct_query: ch.correctQuery || '', encouragement };
}

// ===== RUN QUERY =====
function runQuery() {
  const query = document.getElementById('query-editor').value.trim();
  if (!query) {
    alert('Escreva uma query antes de executar!');
    return;
  }

  const ch = CHALLENGES[state.current];
  const btn = document.getElementById('btn-run');
  const spinner = document.getElementById('spinner');
  const loadingBar = document.getElementById('loading-bar');

  btn.disabled = true;
  spinner.style.display = 'block';
  loadingBar.style.display = 'block';
  document.getElementById('feedback-panel').style.display = 'none';

  // Simulate a small delay for UX
  setTimeout(() => {
    try {
      const result = evaluateQuery(query, ch);
      showFeedback(result, ch);

      if (result.correct === true) {
        state.correct++;
        const xpEarned = state.hintUsed ? Math.floor(ch.xp * 0.6) : ch.xp;
        state.xp += xpEarned;
        state.streak++;
        updateStats();
      }
    } catch (err) {
      console.error(err);
      alert('Erro ao avaliar a query. Tente novamente.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      loadingBar.style.display = 'none';
    }
  }, 800);
}

// ===== SHOW FEEDBACK =====
function showFeedback(result, ch) {

  title.className = `feedback-title ${cls}`;
  title.textContent = isCorrect ? (result.score === 100 ? '🎉 Perfeito!' : '✅ Muito bom!') : '❌ Não foi dessa vez';
  subtitle.textContent = result.encouragement || '';

  // Build result rows
  let tableRows = ch.result.map(row => {
    const cols = Object.keys(row);
    return `<tr>${cols.map(k => `<td>${row[k]}</td>`).join('')}</tr>`;
  }).join('');
  const tableCols = Object.keys(ch.result[0]);
  const tableHead = tableCols.map(k => `<th>${k}</th>`).join('');

  body.innerHTML = `
    <div class="feedback-section">
      <div class="feedback-section-label">📊 Análise</div>
      <div class="feedback-text">${result.explanation}</div>
    </div>

    <div class="feedback-section">
      <div class="feedback-section-label">✅ Resultado esperado</div>
      <div class="result-table-wrap">
        <table class="result-table">
          <thead><tr>${tableHead}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    ${!isCorrect ? `
    <div class="feedback-section">
      <div class="feedback-section-label">💡 Query correta</div>
      <pre class="feedback-code">${result.correct_query}</pre>
    </div>
    ` : ''}

    <div class="feedback-section">
      <div class="feedback-section-label">⚡ Dica de otimização</div>
      <div class="feedback-text" style="color: var(--muted)">${result.optimization}</div>
    </div>

    ${state.current < CHALLENGES.length - 1 ? `
      <button class="btn-next" onclick="nextChallenge()">
        Próximo Desafio →
      </button>
    ` : `
      <button class="btn-next" onclick="showFinal()">
        🏆 Ver Resultado Final
      </button>
    `}
  `;

  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

// ===== PREV CHALLENGE =====

}

// ===== RESET =====
function resetGame() {
  state = { current: 0, correct: 0, xp: 0, streak: 0, hintUsed: false };
  updateStats();
  renderChallenge();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== UPDATE STATS =====
function updateStats() {
  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-xp').textContent = state.xp;
  document.getElementById('stat-streak').textContent = state.streak;
}

// ===== TAB KEY =====
document.addEventListener('DOMContentLoaded', () => {
  const editor = document.getElementById('query-editor');
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      runQuery();
    }
  });

  renderChallenge();
});
